# NCR Rank Pin Progressions
# NCRRankPinSpawnSystem reads these at round start and places the appropriate pin
# in the player's hand based on their playtime in the tracker or department.
#
# Tracker quick-reference (use with: playtime_addrole <user> <tracker> <time>)
#   NCRCommander              — NCR Commander
#   NCRMedicalDoctor          — NCR Medical Doctor
#   NCRExecutiveOfficer       — NCR Executive Officer
#   NCRPlatoonLeader          — NCR Platoon Leader
#   NCRRO                     — NCR Requisition Officer
#   NCRSquadLeader            — NCR Squad Leader (all 4 map slots share this tracker)
#   NCREngineer               — NCR Engineer
#   NCRMedic                  — NCR Medic
#   NCRWeaponSpecialist       — NCR Weapon Specialist
#   NCRHeavyTrooper           — NCR Heavy Trooper
#   NCRTrooper                — NCR Trooper
#   C27NCR                    — NCR C27
#   SuperMutantNCRTrooper     — NCR Super Mutant Trooper
#   NCRMilitaryPoliceRecruit  — NCRMP Specialist
#   NCRMilitaryPoliceSergeant — NCRMP Staff Sergeant
#   NCRMilitaryPoliceCaptain  — NCRMP First Lieutenant

# Commander: Captain (O-3) → Major (O-4) at 20h
- type: ncrRankPinProgression
  id: NCRCommandOfficerPins
  jobs:
    - NCRCommander
  tracker: NCRCommander
  departmentTracker: false
  thresholds:
    - min: 0
      entity: ClothingNeckPinNCRCaptain
    - min: 72000   # 20 hours
      entity: ClothingNeckPinNCRMajor

