# Squad Leaders: CPL (E-4) → SGT (E-5) at 20h → SSG (E-6) at 40h → SFC (E-7) at 60h → MSGT (E-8) at 80h → 1stSGT (E-8) at 100h
# All 4 map slots share the NCRSquadLeader tracker so time accumulates across slots.
- type: ncrRankPinProgression
  id: NCRNCOPins
  jobs:
    - NCRNCO
  tracker: NCRSquadLeader
  departmentTracker: false
  thresholds:
    - min: 0
      entity: ClothingNeckPinNCRCorporal
    - min: 72000   # 20 hours
      entity: ClothingNeckPinNCRSergeant
    - min: 144000  # 40 hours
      entity: ClothingNeckPinNCRStaffSergeant
    - min: 216000  # 60 hours
      entity: ClothingNeckPinNCRSergeant1st
    - min: 288000  # 80 hours
      entity: ClothingNeckPinNCRMasterSergeant
    - min: 360000  # 100 hours
      entity: ClothingNeckPinNCR1stSergeant

