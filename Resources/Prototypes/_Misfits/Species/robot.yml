# Shared marking limits — robots have no body markings but need a valid points block.
- type: markingPoints
  id: RobotMarkingLimits
  onlyWhitelisted: true
  points:
    Chest:
      points: 0
      required: false

# Shared sprite set — robot entities use their own Sprite component, so no humanoid layers needed.
# Empty sprites dict prevents any humanoid-layer overlays on the robot preview.
- type: speciesBaseSprites
  id: RobotSprites
  sprites: {}
