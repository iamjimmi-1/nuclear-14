# #Misfits Add - EnclaveRecruit: hidden job/playtime tracker for per-round recruitment.
# Players recruited by an Enclave member gain this tracker so their playtime
# counts toward Enclave department time requirements. The tracker resets on
# death or round restart.

- type: job
  id: EnclaveRecruit
  setPreference: false
  hideWithoutJobWhitelist: false
  canBeAntag: false
  name: job-name-enclave-recruit
  description: job-description-enclave-recruit
  playTimeTracker: EnclaveRecruit
  supervisors: job-supervisors-none

- type: playTimeTracker
  id: EnclaveRecruit
