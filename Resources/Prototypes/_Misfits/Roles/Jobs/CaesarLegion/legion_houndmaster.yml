- type: job
  id: CaesarLegionHoundmaster
  setPreference: true
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true # #Misfits Change
  weight: 120
  showBorder: true  # #Misfits Change: Starts the "Specialist" tier block below the Decani
  name: job-name-caesar-legion-houndmaster
  description: job-description-caesar-legion-houndmaster
  playTimeTracker: CaesarLegionHoundmaster
  requirements:
    - !type:CharacterDepartmentTimeRequirement # #Misfits Tweak - T5 faction timelock (16h Legion)
      department: CaesarLegion
      min: 57600 # 16 hours
    - !type:CharacterSpeciesRequirement
      species:
      - Human
  startingGear: CaesarLegionHoundmasterGear
  alwaysUseSpawner: true
  icon: "JobIconlegionerWarrior"
  supervisors: job-name-caesar-legion-other
  canBeAntag: false
  accessGroups:
  - CaesarLegionHoundmaster
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - CaesarLegion
      - type: FollowerCommander
        innateFollowerCapacity: 3
      - type: ReplacementAccent
        accent: latin
  - !type:AddTraitSpecial
    traits: [ LanguageLatin, N14PetDogLegion ]

- type: startingGear
  id: CaesarLegionHoundmasterGear
  equipment:
    jumpsuit: N14ClothingUniformJumpsuitLegionnaire
    ears: N14ClothingHeadsetLegion
    neck: N14ClothingNeckCoyoteCloak
    mask: N14ClothingMaskBrownMask
    back: N14ClothingBackpackMilitary
    shoes: N14ClothingShoesKaligi
    gloves: N14ClothingHandsGlovesTribal
    outerClothing: N14ClothingLegionReconArmor
    belt: N14Gladius
    pocket1: LegionHoundmasterloadoutkits
    id: N14IDLegionaryMedalHoundmaster
  innerClothingSkirt: N14ClothingUniformJumpsuitLegionnaireOther
  storage:
    back:
    - N14BoxPlasticFilledMilitaryLegion #Misfits Change /Tweak/: Legion uses tribal medicine, not stimpaks
    - N14HealingPowder

- type: playTimeTracker
  id: CaesarLegionHoundmaster
