# [Changed by MisfitsCrew/Operator] ZAX units are commandable NPC copies of the player-selectable silicon chassis.

- type: entity
  abstract: true
  id: MisfitsZaxUnitBase
  components:
  - type: ZaxUnit
  - type: ZaxLinkedUnit
  - type: ZaxNeutralSpecial
  - type: StationAiVision
  - type: StationAiWhitelist
  - type: SiliconInternalRadio
  - type: EncryptionKeyHolder
    keySlots: 4
  - type: TypingIndicator
    proto: robot
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  - type: Vocal
    sounds:
      Unsexed: UnisexSilicon
  - type: UnblockableSpeech
  - type: LanguageSpeaker
  - type: Examiner
  - type: Hands
    showInHands: true
  - type: BorgHands
  - type: ComplexInteraction
  - type: GhostRole
    name: ghost-role-information-zax-unit-name
    description: ghost-role-information-zax-unit-description
    rules: ghost-role-information-zax-unit-rules
    allowMovement: true
    allowSpeech: true
  - type: GhostTakeoverAvailable
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - WastelandGlobal
    - ZAXBinary
  - type: ActiveRadio
    channels:
    - WastelandGlobal
    - ZAXBinary
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyWastelandGlobal
      - EncryptionKeyZAX
  - type: LanguageKnowledge
    speaks:
    - English
    - N14Robot
    - N14BrotherBeep
    - Latin
    - Chinese
    - Tribal
    - Sign
    understands:
    - English
    - N14Robot
    - N14BrotherBeep
    - Latin
    - Chinese
    - Tribal
    - Sign
  - type: NpcFactionMember
    factions:
    - Wastelander
  - type: HTN
    rootTask:
      task: StationAiOrderedHoldCompound
    blackboard:
      NavSmash: !type:Bool
        true
      AggroVisionRadius: !type:Single
        12
      FollowCloseRange: !type:Single
        0.75
      FollowRange: !type:Single
        0.75
      FollowWaitMin: !type:Single
        0.25
      FollowWaitMax: !type:Single
        0.6

