  description: A ZAX-linked Mr. Handy chassis prepared for remote command.
  suffix: ZAX, commandable
  components:
  - type: BorgHands
    handCount: 3

- type: entity
  parent: [N14MobRobotMrHandyGutsy, MisfitsZaxUnitBase]
  id: N14MobZaxMrGutsy
  name: ZAX Mr. Gutsy unit
  description: A ZAX-linked Mr. Gutsy chassis prepared for remote command.
  suffix: ZAX, commandable
  components:
  - type: MeleeWeapon
    hidden: true
    autoAttack: true
    angle: 0
    wideAnimationRotation: -135
    attackRate: 0.25
    damage:
      types:
        Slash: 6
        Piercing: 3
        Structural: 8
    soundHit:
      path: /Audio/_Nuclear14/Weapons/Melee/Swing/ripper.ogg

