- type: entity
  parent: [N14MobRobotSecuritronHostile, MisfitsZaxUnitBase]
  id: N14MobZaxSecuritron
  name: Z.A.X Securitron
  description: A ZAX-linked Securitron chassis prepared for remote command.
  suffix: ZAX, commandable
  components:
  - type: GhostRole
    name: ghost-role-information-zax-securitron-name
    description: ghost-role-information-zax-securitron-description
    rules: ghost-role-information-zax-securitron-rules
    allowMovement: true
    allowSpeech: true
  - type: Sprite
    sprite: _Misfits/Mobs/Robots/zax_securitron.rsi
    layers:
    - state: icon
      map: ["movement"]
    - state: icon
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: icon
      shader: unshaded
      map: ["light"]
      visible: false
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Dead
    stateAlertDict:
      Alive: BorgHealth
      Dead: HumanDead
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          N14ScrapElectronic1:
            min: 1
            max: 3
          N14MaterialCircuitry1:
            min: 1
            max: 3
          N14Scrap1:
            min: 1
            max: 3
          N14CurrencyPrewar:
            min: 5
            max: 25
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Machines/AI/borg_death.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Reflect
    reflects:
    - SmallCaliber
    - MediumCaliber
    reflectProb: 0.30
    reflectProbByType:
      MediumCaliber: 0.10
    innate: true
    spread: 90

