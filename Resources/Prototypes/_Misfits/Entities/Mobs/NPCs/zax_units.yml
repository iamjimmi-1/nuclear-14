- type: entity
  parent: [N14MobRobotSecuritronHostile, MisfitsZaxUnitBase]
  id: N14MobZaxSecuritron
  name: Z.A.X Securitron
  description: A ZAX-linked Securitron chassis prepared for Station AI command.
  suffix: ZAX, AI controllable
  components:
  - type: GhostRole
    name: ghost-role-information-zax-securitron-name
    description: ghost-role-information-zax-securitron-description
    rules: ghost-role-information-zax-securitron-rules
  - type: GhostTakeoverAvailable
  - type: Sprite
    sprite: _Misfits/Mobs/Robots/zax_securitron.rsi
    layers:
    - state: icon
      map: ["movement"]
      visible: false
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Dead
    stateAlertDict:
      Alive: BorgHealth
      Dead: HumanDead
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          N14ScrapElectronic1:
            min: 1
            max: 3
          N14MaterialCircuitry1:
            min: 1
            max: 3
          N14Scrap1:
            min: 1
            max: 3
          N14CurrencyPrewar:
            min: 5
            max: 25
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Machines/AI/borg_death.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Reflect
    reflects:
    - SmallCaliber
    - MediumCaliber
    reflectProb: 0.30
    reflectProbByType:
      MediumCaliber: 0.10
    innate: true
    spread: 90

- type: entity
  parent: N14MobC27ZAX
  id: N14MobZaxC27
  name: Z.A.X C-27 unit
  description: A Z.A.X-linked C-27 chassis prepared for player takeover.
  suffix: ZAX, ghost role
  components:
  - type: ZaxNeutralSpecial
  - type: GhostRole
    name: ghost-role-information-zax-c27-name
    description: ghost-role-information-zax-c27-description
    rules: ghost-role-information-zax-c27-rules
    allowMovement: true
    allowSpeech: true
  - type: GhostTakeoverAvailable
  - type: MisfitsGhostRoleJobWhitelistRequirement
    jobs:
    - C27ZAX

