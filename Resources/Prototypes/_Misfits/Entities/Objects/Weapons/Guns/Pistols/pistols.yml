- type: entity
  name: desert eagle 44
  parent: N14WeaponDesertEagle44
  id: N14WeaponEnclaveDesertEagle44
  description: An ancient Desert Eagle pistol, in .44 Magnum. Interest in late 20th century films made this one of the most popular handguns of all times.
  components:
  - type: Sprite
    sprite: _Misfits/Objects/Weapons/Guns/Pistols/enclavedeagle.rsi
  - type: Item
    sprite: _Misfits/Objects/Weapons/Guns/Pistols/enclavedeagle.rsi

- type: entity
  name: PPK12
  parent: BaseItem
  id: N14WeaponGaussPistol
  description: Praised for its range and stopping power, the PPK12 Gauss Pistol is of German design. The pistol uses an electromagnetic field to propel rounds at tremendous speed and punch through almost any armor.
  components:
  - type: Tag
    tags:
    - Sidearm
  - type: Sprite
    sprite: _Misfits/Objects/Weapons/Guns/Pistols/gausspistol.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _Misfits/Objects/Weapons/Guns/Pistols/gausspistol.rsi
  - type: AmmoCounter
  - type: Gun
    fireRate: 2
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      collection: N14AutoShotgunGunshot
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: N14Magazine2mmECPistol
        priority: 2
        whitelist:
          tags:
          - N14Magazine2mmECPistol
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineAmmoProvider
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 100
