- type: UndecidedLoadoutBackpackSet
  id: MPStandardKit
  name: Standard Military Police Kit
  description: This kit contains standard-issue NCRMP equipment. This includes - a blowback shotgun, beanbag rounds, a police baton, processing tools, flashbang grenades and smoke grenades. Use with caution.
  sprite:
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: rifleman
  content:
  - KitStandardMP

- type: UndecidedLoadoutBackpackSet
  id: MPMedicalKit
  name: Medical Military Police Kit
  description: This kit contains standard-issue NCRMP medical equipment. This includes - 2 stimpaks, one super stimpak, antidote, webley revolver, clean gauze, surgical duffel bag, handcuffs and a police baton.
  sprite:
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: medic
  content:
  - KitMedicalMP

- type: UndecidedLoadoutBackpackSet
  id: MPEnforcerKit
  name: Enforcer Military Police Kit
  description: This kit contains anti-riot equipment. This includes - riot shotgun, 20 gauge ammo box, 2 frag grenades, shock baton, riot shield, handcuffs and MP helmet.
  sprite:
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: rifleman
  content:
  - KitEnforcerMP

