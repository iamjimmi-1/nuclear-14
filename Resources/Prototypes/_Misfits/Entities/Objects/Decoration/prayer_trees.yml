- type: entity
  id: BasePrayerTree
  abstract: true
  components:
  - type: Prayable
  - type: SpriteFade
  - type: Clickable
  - type: Sprite
    noRot: true
    sprite: Objects/Decoration/Flora/flora_trees.rsi
    drawdepth: Overdoors
    offset: 0,0.9
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35,-0.4,0.35,0.4"
        density: 1000
        layer:
        - WallLayer


- type: entity
  parent: BasePrayerTree
  id: TreeOfMars
  name: Tree of Mars
  description: The leaves whisper of past deeds and glories.
  components:
  - type: Sprite
    sprite: _Misfits/Structures/Decoration/Flora/mutant_trees.rsi
    state: tree-of-mars
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.9,-0.8,0.9,0.4"
        density: 1000
        layer:
          - WallLayer
  - type: PointLight
    color: "#fadcc0"
    radius: 5
    power: 4

- type: entity
  parent: BasePrayerTree
  id: TribalTree
  name: Tree of Life
  description: The glowing strands sway gently in the still air.
  components:
    - type: Sprite
      sprite: _Misfits/Structures/Decoration/Flora/mutant_trees.rsi
      state: tribal-tree
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.5,-0.65,0.5,0.2"
          density: 1000
          layer:
            - WallLayer
    - type: PointLight
      color: "#c0faef"
      radius: 5
      power: 4
