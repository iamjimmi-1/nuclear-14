- type: entity
  id: BaseSpeedLoaderInternal308
  name: "speed loader internal 308"
  parent: BaseItem
  abstract: true
  components:
  - type: Tag
    tags:
    - SpeedLoaderInternal
  - type: SpeedLoader
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - N14Cartridge308Rifle
    capacity: 8
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Speedloaders/45_70loadertube.rsi # Borrowing the 45-70 sprite
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []

- type: entity
  id: SpeedLoader308Tube
  name: "speed loader tube (.308)"
  parent: BaseSpeedLoaderInternal308
  components:
  - type: BallisticAmmoProvider
    proto: N14Cartridge308Rifle
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: base-10
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: base
    steps: 9
    zeroVisible: false
  - type: Appearance