
- type: entity
  id: N14BaseMagazine2mmECRifle
  name: 2mmEC 20 capacity magazine
  parent: BaseItem
  components:
  - type: Tag
    tags:
    - N14Magazine2mmECRifle
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - N14Cartridge2mmEC
    capacity: 20
    soundRack:
      path: /Audio/Weapons/Guns/Cock/smg_cock.ogg
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    netsync: false
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Magazines/12gauge/mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

- type: entity
  id: N14Magazine2mmECRifle
  name: 2mmEC 20 capacity magazine
  parent: N14BaseMagazine2mmECRifle
  components:
  - type: BallisticAmmoProvider
    proto: N14Cartridge2mmEC

